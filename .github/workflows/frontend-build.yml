name: Frontend Build

on:
  pull_request:
    paths:
      - "002-code/healthcareform-angular/**"
      - ".github/workflows/frontend-build.yml"
  push:
    branches:
      - main
    paths:
      - "002-code/healthcareform-angular/**"
      - ".github/workflows/frontend-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 002-code/healthcareform-angular
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: 002-code/healthcareform-angular/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build
