name: Backend Build

on:
  pull_request:
    paths:
      - "002-code/HealthcareForm/**"
      - "002-code/HealthcareForm.Tests/**"
      - ".github/workflows/backend-build.yml"
  push:
    branches:
      - main
    paths:
      - "002-code/HealthcareForm/**"
      - "002-code/HealthcareForm.Tests/**"
      - ".github/workflows/backend-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 002-code/HealthcareForm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HealthcareForm.sln

      - name: Build
        run: dotnet build HealthcareForm.sln -c Release --no-restore

      - name: Test
        run: dotnet test HealthcareForm.sln -c Release --no-build
