name: Stored Procedure Validation

on:
  pull_request:
    paths:
      - "002-code/HealthcareForm/**"
      - "001-database/006-stored-procedures/**"
      - "scripts/validate-stored-procedures.sh"
      - ".github/workflows/stored-procedure-validation.yml"
  push:
    branches:
      - main
    paths:
      - "002-code/HealthcareForm/**"
      - "001-database/006-stored-procedures/**"
      - "scripts/validate-stored-procedures.sh"
      - ".github/workflows/stored-procedure-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-stored-procedures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ripgrep is available
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Validate Called vs Defined Stored Procedures
        run: ./scripts/validate-stored-procedures.sh
