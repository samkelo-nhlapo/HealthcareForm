apiVersion: batch/v1
kind: Job
metadata:
  name: run-migrations
spec:
  template:
    spec:
      containers:
      - name: flyway
        image: flyway/flyway:9.10
        env:
        - name: FLYWAY_URL
          value: "jdbc:sqlserver://mssql:1433;databaseName=HealthcareForm"
        - name: FLYWAY_USER
          value: "sa"
        - name: FLYWAY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mssql-secret
              key: sa-password
        volumeMounts:
        - name: migrations
          mountPath: /flyway/sql
      restartPolicy: OnFailure
      volumes:
      - name: migrations
        configMap:
          name: db-migrations-configmap
  backoffLimit: 2
