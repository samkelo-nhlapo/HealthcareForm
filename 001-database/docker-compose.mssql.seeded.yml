services:
  mssql:
    image: ${MSSQL_SEEDED_IMAGE_TAG:-healthcare-form/mssql-seeded:latest}
    container_name: healthcare-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in your shell or .env}"
      MSSQL_PID: "Developer"
      MSSQL_AUTO_RESTORE: "${MSSQL_AUTO_RESTORE:-true}"
      MSSQL_RESTORE_DB_NAME: "${MSSQL_RESTORE_DB_NAME:-HealthcareForm}"
      MSSQL_BACKUP_FILE: "/seed/HealthcareForm.bak"
    ports:
      - "1433:1433"
    volumes:
      - ${MSSQL_VOLUME_ROOT:-./docker-volumes/mssql}/data:/var/opt/mssql/data
      - ${MSSQL_VOLUME_ROOT:-./docker-volumes/mssql}/log:/var/opt/mssql/log
      - ${MSSQL_VOLUME_ROOT:-./docker-volumes/mssql}/backup:/var/opt/mssql/backup
    restart: unless-stopped
